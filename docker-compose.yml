version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pmp-postgres
    environment:
      POSTGRES_USER: pmp
      POSTGRES_PASSWORD: pmp123
      POSTGRES_DB: pmp_study
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pmp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ollama:
    image: ollama/ollama:latest
    container_name: pmp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    profiles:
      - ollama

volumes:
  pgdata:
  redisdata:
  ollama:
